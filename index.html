<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideIQ Egypt</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <h1>🚗 RideIQ Egypt</h1>

        <p>Smart Ride Analyzer</p>

    </header>


    <div class="card">

        <label>

            💰 سعر الرحلة

        </label>

        <input
            type="number"
            id="fare"
            placeholder="مثال 180">




        <label>

            📍 مسافة الوصول (كم)

        </label>

        <input
            type="number"
            id="pickup"
            placeholder="مثال 3">





        <label>

            🚕 مسافة الرحلة (كم)

        </label>

        <input
            type="number"
            id="trip"
            placeholder="مثال 15">



        <button id="calculateBtn">

            احسب الرحلة

        </button>

    </div>






    <div class="card resultCard">

        <h2>

            تحليل الرحلة

        </h2>

        <div class="resultRow">

            <span>

                إجمالي المسافة

            </span>

            <span id="distanceResult">

                --

            </span>

        </div>


        <div class="resultRow">

            <span>

                سعر الكيلو

            </span>

            <span id="pricePerKm">

                --

            </span>

        </div>




        <div class="resultRow">

            <span>

                تكلفة البنزين

            </span>

            <span id="fuelCost">

                --

            </span>

        </div>




        <div class="resultRow">

            <span>

                صافي الربح

            </span>

            <span id="profit">

                --

            </span>

        </div>




        <div class="decision" id="decision">

            فى انتظار البيانات

        </div>




        <button id="saveRide">

            حفظ الرحلة

        </button>

    </div>








    <div class="card">

        <h2>

            ملخص اليوم

        </h2>


        <div class="summaryRow">

            <span>

                عدد الرحلات

            </span>

            <span id="rideCount">

                0

            </span>

        </div>


        <div class="summaryRow">

            <span>

                الإيراد

            </span>

            <span id="totalIncome">

                0

            </span>

        </div>


        <div class="summaryRow">

            <span>

                البنزين

            </span>

            <span id="totalFuel">

                0

            </span>

        </div>


        <div class="summaryRow">

            <span>

                الإيجار

            </span>

            <span>

                1200

            </span>

        </div>


        <div class="summaryRow finalProfit">

            <span>

                صافى الربح

            </span>

            <span id="dayProfit">

                0

            </span>

        </div>

    </div>


</div>


<script src="app.js"></script>

</body>

</html>
